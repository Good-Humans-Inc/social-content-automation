<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
    }
    .status {
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 16px;
    }
    .status.active {
      background-color: #d1fae5;
      color: #065f46;
    }
    .status.inactive {
      background-color: #fee2e2;
      color: #991b1b;
    }
    button {
      width: 100%;
      padding: 8px;
      background-color: #3b82f6;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover {
      background-color: #2563eb;
    }
    button:disabled {
      background-color: #9ca3af;
      cursor: not-allowed;
    }
    a {
      color: #3b82f6;
      text-decoration: none;
      font-size: 14px;
    }
    a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1>GeeLark Scraper</h1>
  <div id="status" class="status inactive">Inactive</div>
  <div id="jobInfo" style="margin-bottom: 16px; font-size: 14px; color: #6b7280;"></div>
  <button id="openOptions">Configure</button>
  <div style="margin-top: 16px; text-align: center;">
    <a href="#" id="openDashboard">Open Dashboard</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
